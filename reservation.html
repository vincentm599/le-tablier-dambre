<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Réservation | Le Tablier d'Ambre</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="reservation.css">
</head>

<body>

    <a href="index.html" class="back-btn">
        ← Accueil
    </a>

    <section class="reservation-page">

        <div class="overlay"></div>

        <div class="reservation-container">

            <div class="reservation-info">

                <span class="subtitle">RÉSERVATION</span>

                <h1>Réservez votre table</h1>

                <div class="gold-line"></div>

                <p>
                    Nous serons ravis de vous accueillir au Tablier d'Ambre.
                    Réservez votre table en quelques instants et profitez
                    d'une expérience gastronomique unique.
                </p>

            </div>

            <form
    class="reservation-form"
    action="https://formspree.io/f/mjgdgrgv"
    method="POST">

                <input type="text" name="nom" placeholder="Nom complet" required>

                <input type="email" name="email" placeholder="Adresse e-mail" required>

                <input type="tel" name="telephone" placeholder="Téléphone" required>

                <div class="field">
    <label>Date de réservation</label>
    <input type="date" name="date" required>
</div>

<div class="field">
    <label>Heure souhaitée</label>
    <input type="time" name="heure" required>
</div>

                <select name="personnes" required>
                    <option>1 personne</option>
                    <option>2 personnes</option>
                    <option>3 personnes</option>
                    <option>4 personnes</option>
                    <option>5 personnes</option>
                    <option>6 personnes</option>
                    <option>7 personnes</option>
                    <option>8 personnes</option>
                </select>

                <textarea
    name="message"
    placeholder="Informations complémentaires">
</textarea>
<input
    type="hidden"
    name="_subject"
    value="Nouvelle réservation - Le Tablier d'Ambre">
                <button type="submit">
                    Réserver
                </button>

            </form>

        </div>

    </section>

</body>

</html>
