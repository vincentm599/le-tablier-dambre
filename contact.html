<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Contact | Restaurant</title>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="contact.css">
</head>
<body>

<section class="contact">

    <div class="overlay"></div>

    <div class="contact-container">

        <div class="contact-info">

            <h1>Contact</h1>

            <p>
                Nous sommes à votre disposition pour toute réservation
                ou demande d'information.
            </p>

            <div class="info">
                <h3>Adresse</h3>
                <p>12 Rue de la république<br>75000 Paris</p>
            </div>

            <div class="info">
                <h3>Téléphone</h3>
                <p>01 23 45 67 89</p>
            </div>

            <div class="info">
                <h3>Email</h3>
                <p>contact@letablierdambre.fr</p>
            </div>

        </div>

        <form class="contact-form">

            <input type="text" placeholder="Votre nom" required>

            <input type="email" placeholder="Votre email" required>

            <input type="tel" placeholder="Votre téléphone">

            <textarea placeholder="Votre message" rows="6"></textarea>

            <button type="submit">
                Envoyer
            </button>

        </form>

    </div>
    <a href="index.html" class="back-btn">
    ← Retour à l'accueil
</a>

</section>

</body>
</html>
