<!DOCTYPE html>
<html lang="fr">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Merci | Le Tablier d'Ambre</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:#111;

    font-family:Arial,sans-serif;
}

.merci-box{
    background:white;

    padding:50px;

    max-width:600px;

    text-align:center;

    border-radius:15px;

    box-shadow:0 15px 40px rgba(0,0,0,.3);
}

h1{
    color:#c8a96b;

    margin-bottom:20px;
}

p{
    line-height:1.8;

    color:#555;

    margin-bottom:30px;
}

a{
    display:inline-block;

    padding:14px 30px;

    background:#c8a96b;

    color:white;

    text-decoration:none;

    border-radius:6px;

    transition:.3s;
}

a:hover{
    opacity:.85;
}

</style>

</head>

<body>

<div class="merci-box">

    <h1>✓ Merci pour votre réservation</h1>

    <p>
        Votre demande a bien été envoyée.<br>
        Nous vous contacterons rapidement afin de confirmer votre table.
    </p>

    <a href="index.html">
        Retour à l'accueil
    </a>

</div>

</body>

</html>
